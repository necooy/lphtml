<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Imobiliária</title>
    <link rel="stylesheet" href="./index.css">
    <script src="./index.js"></script>
</head>
<body>

    <div class="landing">
        
        <header class="header">
        

            <nav class="infos">
                <a href="#">venda</a>
                <a href="#">informações</a>
                <a href="#">contatos</a>
            </nav>

            <button class="agendar" onclick="window.open('https://wa.me/numero', '_blank')">
                agendar
            </button>
        </header>
        
        <main class="main-content">
            <div class="search-container">
                
                <div class="tabs">
                    <button id="btn-comprar" class="tab-btn active" onclick="setAba('comprar')">Comprar</button>
                    <button id="btn-alugar" class="tab-btn" onclick="setAba('alugar')">Alugar</button>
                </div>

                <div class="search-box">
                    <div class="field-group">
                        <label>Localização</label>
                        <select id="select-local" class="select-imobiliaria">
                            <option value="">Selecione a cidade...</option>
                            <option value="sp">São Paulo - SP</option>
                            <option value="rj">Rio de Janeiro - RJ</option>
                            <option value="curitiba">Curitiba - PR</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label>Tipo de Imóvel</label>
                        <select class="select-imobiliaria">
                            <option value="casa">Casa</option>
                            <option value="ap">Apartamento</option>
                            <option value="lote">Terreno</option>
                        </select>
                    </div>

                    <button class="btn-buscar-main" onclick="buscar()">BUSCAR</button>
                </div>
            </div>
        </main>

        <button class="contato" onclick="window.open('https://web.whatsapp.com', '_blank')">
            📞
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
